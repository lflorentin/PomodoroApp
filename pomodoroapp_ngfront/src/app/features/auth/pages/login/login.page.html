<div class="login-container">
    <h1>Connexion</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="email@example.com" />
            <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
                Email invalide
            </small>
        </div>

        <div class="field">
            <label>Mot de passe</label>
            <input type="password" formControlName="password" placeholder="••••••••" />
            <small *ngIf="form.controls.password.touched && form.controls.password.invalid">
                Minimum 6 caractères
            </small>
        </div>

        <div class="error" *ngIf="error">
            {{ error }}
        </div>

        <button type="submit" [disabled]="loading">
            {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>

    </form>
</div>
